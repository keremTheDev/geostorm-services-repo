services:
  postgres:
    image: postgres:16-alpine
    container_name: geostorm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geostorm}
      POSTGRES_USER: ${POSTGRES_USER:-geostorm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-geostorm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - geostorm-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: geostorm-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-geostorm}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - geostorm-net

  geostorm-mcp-server:
    image: ${MCP_SERVER_IMAGE:-ghcr.io/replace_me/geostorm-mcp-server:latest}
    container_name: geostorm-mcp-server
    restart: unless-stopped
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 6274
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
    expose:
      - "6274"
      - "50051"
    ports:
      - "${MCP_HTTP_PORT_HOST:-6274}:6274"
      - "${MCP_GRPC_PORT_HOST:-50051}:50051"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6274/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - geostorm-net

  geostorm-ai-engine:
    image: ${AI_ENGINE_IMAGE:-ghcr.io/replace_me/geostorm-ai-engine:latest}
    container_name: geostorm-ai-engine
    restart: unless-stopped
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-grpc}
      MCP_GRPC_HOST: ${MCP_GRPC_HOST:-geostorm-mcp-server}
      MCP_GRPC_PORT: ${MCP_GRPC_PORT:-50051}
      MCP_GRPC_TIMEOUT_SECONDS: ${MCP_GRPC_TIMEOUT_SECONDS:-30}
      MCP_BASE_URL: http://geostorm-mcp-server:6274
      MCP_CONTEXT_PATH: /context
      MCP_TIMEOUT_SECONDS: 30
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-geostorm}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000},http://127.0.0.1:${FRONTEND_PORT:-3000}
    ports:
      - "${AI_ENGINE_PORT:-8000}:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      geostorm-mcp-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - geostorm-net

  geostorm-alert-service:
    image: ${ALERT_SERVICE_IMAGE:-ghcr.io/replace_me/geostorm-alert-service:latest}
    container_name: geostorm-alert-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - alert_reports:/app/reports
    healthcheck:
      test: ["CMD-SHELL", "test -d /proc/1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - geostorm-net

  geostorm-frontend-gateway:
    image: ${FRONTEND_GATEWAY_IMAGE:-ghcr.io/replace_me/geostorm-frontend-gateway:latest}
    container_name: geostorm-frontend-gateway
    restart: unless-stopped
    environment:
      FASTAPI_URL: ${FASTAPI_URL:-http://geostorm-ai-engine:8000/api/v1/insight}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      geostorm-ai-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - geostorm-net

volumes:
  postgres_data:
  alert_reports:

networks:
  geostorm-net:
    driver: bridge
